<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>薪資詳細計算</title>
    <style>
        :root {
            --bg-color: #e0f2fe;
            --card-bg: #ffffff;
            --border: #000000;
            --plus-bg: #f0fdf4; /* 加項綠 */
            --minus-bg: #fef2f2; /* 減項紅 */
            --accent: #fbbf24;
        }

        * { box-sizing: border-box; font-family: sans-serif; }
        body { background-color: var(--bg-color); padding: 20px; margin: 0; }
        
        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: var(--card-bg);
            border: 3px solid var(--border);
            box-shadow: 8px 8px 0px var(--border);
            padding: 20px;
        }

        h2 { border-bottom: 3px solid var(--border); padding-bottom: 10px; margin-top: 0; }

        section {
            margin-bottom: 25px;
            padding: 15px;
            border: 2px solid var(--border);
            box-shadow: 4px 4px 0px var(--border);
        }

        .plus-section { background-color: var(--plus-bg); }
        .minus-section { background-color: var(--minus-bg); }

        .section-title { font-weight: 900; margin-bottom: 15px; display: block; font-size: 1.1rem; }

        .input-item { margin-bottom: 12px; }
        label { display: block; font-size: 0.9rem; font-weight: bold; margin-bottom: 5px; }
        
        input {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--border);
            font-size: 16px;
            outline: none;
        }

        .summary-box {
            background: #fff;
            border: 2px solid var(--border);
            padding: 10px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            border: 3px solid var(--border);
            box-shadow: 5px 5px 0px var(--border);
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            margin: 20px 0;
        }

        button:active { transform: translate(2px, 2px); box-shadow: 3px 3px 0px var(--border); }

        .final-result {
            background: #000;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        .final-amount { font-size: 2rem; display: block; color: #4ade80; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>薪資明細計算</h2>

    <section class="plus-section">
        <span class="section-title">➕ 應發項目 (加項)</span>
        <div class="input-item">
            <label>本薪</label>
            <input type="number" class="plus-input" id="baseSalary" value="0">
        </div>
        <div class="input-item">
            <label>伙食津貼</label>
            <input type="number" class="plus-input" id="foodAllowance" value="0">
        </div>
        <div class="input-item">
            <label>節慶/其他獎金</label>
            <input type="number" class="plus-input" id="bonus" value="0">
        </div>
        <div class="summary-box">
            <span>應發合計：</span>
            <span id="totalPlus">$0</span>
        </div>
    </section>

    <section class="minus-section">
        <span class="section-title">➖ 應扣項目 (減項)</span>
        <div class="input-item">
            <label>遲到扣薪</label>
            <input type="number" class="minus-input" id="lateDeduction" value="0">
        </div>
        <div class="input-item">
            <label>病假/生理假扣薪</label>
            <input type="number" class="minus-input" id="leaveDeduction" value="0">
        </div>
        <div class="input-item">
            <label>勞保費</label>
            <input type="number" class="minus-input" id="laborIns" value="0">
        </div>
        <div class="input-item">
            <label>健保費</label>
            <input type="number" class="minus-input" id="healthIns" value="0">
        </div>
        <div class="summary-box">
            <span>應扣合計：</span>
            <span id="totalMinus">$0</span>
        </div>
    </section>

    <button onclick="calculateAll()">開始計算</button>

    <div class="final-result">
        <span>實發總額</span>
        <span class="final-amount" id="finalNet">$0</span>
    </div>
</div>

<script>
    function calculateAll() {
        // 計算加項
        const plusInputs = document.querySelectorAll('.plus-input');
        let sumPlus = 0;
        plusInputs.forEach(input => sumPlus += parseFloat(input.value) || 0);
        document.getElementById('totalPlus').innerText = `$${sumPlus.toLocaleString()}`;

        // 計算減項
        const minusInputs = document.querySelectorAll('.minus-input');
        let sumMinus = 0;
        minusInputs.forEach(input => sumMinus += parseFloat(input.value) || 0);
        document.getElementById('totalMinus').innerText = `$${sumMinus.toLocaleString()}`;

        // 實發金額
        const final = sumPlus - sumMinus;
        document.getElementById('finalNet').innerText = `$${final.toLocaleString()}`;
    }
</script>

</body>
</html>
